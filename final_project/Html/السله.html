<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Puzzle Layout</title>
<link rel="stylesheet" href="../css/السله.css">
<link rel="stylesheet" href="../css/all.min.css">
 <link rel="stylesheet" href="../css/bootstrap.min.css">
 
</head>
<body>
<section class="game">

<h2>ضع الموز والتفاحه</h2>

<div class="foods">

<img src="../images/apple.jpg" draggable="true" id="apple" class="food">
<img src="../images/banana.jpg" draggable="true" id="banana" class="food">
<img src="../images/burger.jpg" draggable="true" id="burger" class="food">
<img src="../images/candy.jpg" draggable="true" id="candy" class="food">

</div>

<div class="basket" id="basket">

<img src="../images/basket.png" alt="">
</div>

<p id="message"></p>

<div class="score-board">
Score: <span id="score">0</span>
</div>

<div class="progress-bar">
<div id="progress"></div>
</div>

<audio id="correctSound" src="sounds/correct.mp3"></audio>
<audio id="wrongSound" src="sounds/wrong.mp3"></audio>

</section>

    <script src="../js/السله.js"></script>
</body>
